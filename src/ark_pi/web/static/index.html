<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ark Pi</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8f9fa;
      --fg: #1a1a1a;
      --muted: #555;
      --border: #ccc;
      --error-bg: #fff5f5;
      --error-border: #c0392b;
      --error-fg: #922b21;
      --success-bg: #f0fdf4;
      --success-border: #16a34a;
      --success-fg: #14532d;
      --btn-bg: #2563eb;
      --btn-fg: #fff;
      --btn-disabled: #94a3b8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --fg: #eee;
        --muted: #aaa;
        --border: #444;
        --error-bg: #2d1f1f;
        --error-border: #e74c3c;
        --error-fg: #f5b7b1;
        --success-bg: #1a2e1a;
        --success-border: #22c55e;
        --success-fg: #bbf7d0;
        --btn-bg: #3b82f6;
        --btn-disabled: #475569;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      margin: 0;
      padding: 1rem;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
    }
    h1 { margin-top: 0; font-size: 1.5rem; }
    h2 { font-size: 1.15rem; margin: 0 0 0.75rem; }
    .intro { color: var(--muted); margin-bottom: 1.5rem; }
    .panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      background: var(--bg);
      color: var(--fg);
      margin-bottom: 1rem;
    }
    textarea { min-height: 5rem; resize: vertical; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .checkbox-row label { margin: 0; font-weight: normal; }
    button[type="submit"] {
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: none;
      border-radius: 4px;
      padding: 0.6rem 1.25rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button[type="submit"]:disabled {
      background: var(--btn-disabled);
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.5rem 1rem;
      font: inherit;
      cursor: pointer;
      width: 100%;
      margin-bottom: 1rem;
    }
    .hint { color: var(--muted); font-size: 0.9rem; margin: -0.5rem 0 1rem; }
    .output { margin-top: 1.5rem; }
    .output section { margin-bottom: 1.25rem; }
    .output h2 { font-size: 1.1rem; margin: 0 0 0.5rem; }
    .hidden { display: none; }
    #error-box {
      border: 2px solid var(--error-border);
      background: var(--error-bg);
      color: var(--error-fg);
      padding: 0.75rem 1rem;
      border-radius: 4px;
    }
    #error-box strong { display: block; margin-bottom: 0.25rem; }
    #ingest-error-box {
      border: 2px solid var(--error-border);
      background: var(--error-bg);
      color: var(--error-fg);
      padding: 0.75rem 1rem;
      border-radius: 4px;
    }
    #ingest-error-box strong { display: block; margin-bottom: 0.25rem; }
    #ingest-success-box {
      border: 2px solid var(--success-border);
      background: var(--success-bg);
      color: var(--success-fg);
      padding: 0.75rem 1rem;
      border-radius: 4px;
    }
    #ingest-success-box strong { display: block; margin-bottom: 0.25rem; }
    .chunk {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .chunk-meta { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem;
      overflow-x: auto;
      font-size: 0.85rem;
    }
    @media (max-width: 600px) {
      body { padding: 0.75rem; }
      h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ark Pi</h1>
    <p class="intro">
      Local development UI. Paste text to build an index, then ask questions
      against it. Uses the mock LLM backend by default — no cloud or external services.
    </p>

    <section class="panel" aria-labelledby="ingest-heading">
      <h2 id="ingest-heading">Add text</h2>
      <form id="ingest-form">
        <label for="index-name">Index name</label>
        <input type="text" id="index-name" name="index_name" value="sample" required>

        <label for="doc-title">Document title</label>
        <input type="text" id="doc-title" name="title" value="sample" required>

        <label for="doc-text">Document text</label>
        <textarea id="doc-text" name="text" placeholder="Paste document text here…" required></textarea>

        <div class="checkbox-row">
          <input type="checkbox" id="ingest-force" name="force">
          <label for="ingest-force">Force rebuild (overwrite existing index)</label>
        </div>

        <button type="submit" id="ingest-button">Build index</button>
      </form>

      <div class="output">
        <section id="ingest-error-section" class="hidden" aria-live="polite">
          <div id="ingest-error-box">
            <strong>Error:</strong>
            <span id="ingest-error-text"></span>
          </div>
        </section>
        <section id="ingest-success-section" class="hidden" aria-live="polite">
          <div id="ingest-success-box">
            <strong>Success:</strong>
            <span id="ingest-success-text"></span>
          </div>
        </section>
      </div>
    </section>

    <section class="panel" aria-labelledby="ask-heading">
      <h2 id="ask-heading">Ask</h2>
    <form id="ask-form">
      <label for="index-select">Index</label>
      <select id="index-select" name="index_select" aria-describedby="index-hint">
        <option value="">Loading indexes…</option>
      </select>
      <p id="index-hint" class="hint">No indexes yet — add text above to create one.</p>
      <button type="button" id="refresh-indexes" class="secondary">Refresh indexes</button>
      <input type="hidden" id="index-dir" name="index_dir" value="">

      <label for="question">Question</label>
      <textarea id="question" name="question" placeholder="Which Pi owns prompt assembly?" required></textarea>

      <div class="checkbox-row">
        <input type="checkbox" id="include-context" name="include_context">
        <label for="include-context">Include retrieved context</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="include-prompt" name="include_prompt">
        <label for="include-prompt">Include assembled prompt</label>
      </div>

      <button type="submit" id="ask-button">Ask</button>
    </form>

    <div class="output">
      <section id="error-section" class="hidden" aria-live="polite">
        <div id="error-box">
          <strong>Error:</strong>
          <span id="error-text"></span>
        </div>
      </section>

      <section id="answer-section" class="hidden">
        <h2>Answer</h2>
        <p id="answer-text"></p>
        <p id="retrieved-count" class="chunk-meta"></p>
      </section>

      <section id="context-section" class="hidden">
        <h2>Retrieved context</h2>
        <div id="context-list"></div>
      </section>

      <section id="prompt-section" class="hidden">
        <h2>Assembled prompt</h2>
        <pre id="prompt-text"></pre>
      </section>
    </div>
    </section>
  </div>

  <script>
    (function () {
      function parseApiError(result) {
        var msg = "Request failed (" + result.status + ")";
        if (result.data && result.data.detail) {
          msg = result.data.detail;
          if (result.data.error) {
            msg = result.data.error + ": " + result.data.detail;
          }
        }
        return msg;
      }

      function fetchJson(url, payload) {
        return fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        }).then(function (response) {
          return response.json().then(function (data) {
            return { ok: response.ok, status: response.status, data: data };
          }).catch(function () {
            return { ok: response.ok, status: response.status, data: null };
          });
        });
      }

      function fetchGet(url) {
        return fetch(url).then(function (response) {
          return response.json().then(function (data) {
            return { ok: response.ok, status: response.status, data: data };
          }).catch(function () {
            return { ok: response.ok, status: response.status, data: null };
          });
        });
      }

      var ingestForm = document.getElementById("ingest-form");
      var ingestButton = document.getElementById("ingest-button");
      var ingestErrorSection = document.getElementById("ingest-error-section");
      var ingestErrorText = document.getElementById("ingest-error-text");
      var ingestSuccessSection = document.getElementById("ingest-success-section");
      var ingestSuccessText = document.getElementById("ingest-success-text");
      var indexDirInput = document.getElementById("index-dir");
      var indexSelect = document.getElementById("index-select");
      var indexHint = document.getElementById("index-hint");
      var refreshIndexesButton = document.getElementById("refresh-indexes");
      var indexesCache = [];

      function hideIngestOutput() {
        ingestErrorSection.classList.add("hidden");
        ingestSuccessSection.classList.add("hidden");
        ingestErrorText.textContent = "";
        ingestSuccessText.textContent = "";
      }

      function populateIndexSelect(indexes, selectedSlug) {
        indexesCache = indexes || [];
        indexSelect.innerHTML = "";
        if (!indexesCache.length) {
          var emptyOption = document.createElement("option");
          emptyOption.value = "";
          emptyOption.textContent = "No indexes available";
          indexSelect.appendChild(emptyOption);
          indexDirInput.value = "";
          indexHint.textContent = "No indexes yet — add text above to create one.";
          return;
        }
        indexesCache.forEach(function (entry) {
          var option = document.createElement("option");
          option.value = entry.slug;
          option.textContent = entry.name + " (" + entry.chunk_count + " chunks)";
          option.dataset.indexDir = entry.index_dir;
          indexSelect.appendChild(option);
        });
        indexHint.textContent = "Select an index to ask against.";
        var slugToSelect = selectedSlug || indexesCache[0].slug;
        indexSelect.value = slugToSelect;
        var selected = indexesCache.find(function (entry) {
          return entry.slug === slugToSelect;
        }) || indexesCache[0];
        indexDirInput.value = selected.index_dir;
      }

      function loadIndexes(selectedSlug) {
        return fetchGet("/api/indexes").then(function (result) {
          if (!result.ok || !result.data) {
            indexHint.textContent = "Could not load indexes.";
            return;
          }
          populateIndexSelect(result.data.indexes || [], selectedSlug);
        });
      }

      refreshIndexesButton.addEventListener("click", function () {
        loadIndexes(indexSelect.value || undefined);
      });

      indexSelect.addEventListener("change", function () {
        var selected = indexesCache.find(function (entry) {
          return entry.slug === indexSelect.value;
        });
        indexDirInput.value = selected ? selected.index_dir : "";
      });

      ingestForm.addEventListener("submit", function (event) {
        event.preventDefault();
        hideIngestOutput();
        ingestButton.disabled = true;
        ingestButton.textContent = "Building…";

        var payload = {
          title: document.getElementById("doc-title").value.trim(),
          text: document.getElementById("doc-text").value.trim(),
          index_name: document.getElementById("index-name").value.trim(),
          use_workspace: true,
          force: document.getElementById("ingest-force").checked
        };

        fetchJson("/api/ingest/text", payload)
          .then(function (result) {
            if (!result.ok) {
              ingestErrorText.textContent = parseApiError(result);
              ingestErrorSection.classList.remove("hidden");
              return;
            }
            var data = result.data;
            ingestSuccessText.textContent = data.message || (
              "Built index with " + data.chunk_count + " chunk(s)."
            );
            ingestSuccessSection.classList.remove("hidden");
            return loadIndexes(data.index_slug || data.index_name);
          })
          .catch(function (err) {
            ingestErrorText.textContent = err.message || "Network error";
            ingestErrorSection.classList.remove("hidden");
          })
          .finally(function () {
            ingestButton.disabled = false;
            ingestButton.textContent = "Build index";
          });
      });

      loadIndexes();

      var form = document.getElementById("ask-form");
      var askButton = document.getElementById("ask-button");
      var errorSection = document.getElementById("error-section");
      var errorText = document.getElementById("error-text");
      var answerSection = document.getElementById("answer-section");
      var answerText = document.getElementById("answer-text");
      var retrievedCount = document.getElementById("retrieved-count");
      var contextSection = document.getElementById("context-section");
      var contextList = document.getElementById("context-list");
      var promptSection = document.getElementById("prompt-section");
      var promptText = document.getElementById("prompt-text");

      function hideOutput() {
        errorSection.classList.add("hidden");
        answerSection.classList.add("hidden");
        contextSection.classList.add("hidden");
        promptSection.classList.add("hidden");
        errorText.textContent = "";
        answerText.textContent = "";
        retrievedCount.textContent = "";
        contextList.innerHTML = "";
        promptText.textContent = "";
      }

      function showError(message) {
        errorText.textContent = message;
        errorSection.classList.remove("hidden");
      }

      function renderContext(chunks) {
        contextList.innerHTML = "";
        chunks.forEach(function (chunk) {
          var div = document.createElement("div");
          div.className = "chunk";
          var meta = document.createElement("div");
          meta.className = "chunk-meta";
          meta.textContent = "#" + chunk.rank + " · " + chunk.title +
            " · " + chunk.id + " · score " + chunk.score.toFixed(2);
          var body = document.createElement("p");
          body.textContent = chunk.text;
          div.appendChild(meta);
          div.appendChild(body);
          contextList.appendChild(div);
        });
        contextSection.classList.remove("hidden");
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        hideOutput();
        var indexDir = indexDirInput.value.trim();
        if (!indexDir) {
          showError("Select an index first, or build one using Add text.");
          return;
        }
        askButton.disabled = true;
        askButton.textContent = "Asking…";

        var payload = {
          index_dir: indexDir,
          question: document.getElementById("question").value.trim(),
          include_context: document.getElementById("include-context").checked,
          include_prompt: document.getElementById("include-prompt").checked
        };

        fetchJson("/api/ask", payload)
          .then(function (result) {
            if (!result.ok) {
              showError(parseApiError(result));
              return;
            }
            var data = result.data;
            answerText.textContent = data.answer || "";
            retrievedCount.textContent = "Retrieved chunks: " + (data.retrieved_count || 0);
            answerSection.classList.remove("hidden");
            if (data.context && data.context.length > 0) {
              renderContext(data.context);
            }
            if (data.prompt) {
              promptText.textContent = data.prompt;
              promptSection.classList.remove("hidden");
            }
          })
          .catch(function (err) {
            showError(err.message || "Network error");
          })
          .finally(function () {
            askButton.disabled = false;
            askButton.textContent = "Ask";
          });
      });
    })();
  </script>
</body>
</html>
